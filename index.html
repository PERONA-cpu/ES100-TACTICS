<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estratega Maestro - Mundo 100</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #1a1005; --panel: #2b1d0e; --text: #e7d1b1; --accent: #ffb74d; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: var(--text); }
        #wrapper { display: flex; width: 100vw; height: 100vh; }
        #sidebar { width: 450px; min-width: 450px; background: var(--panel); border-right: 2px solid #5e463a; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        #map-container { flex-grow: 1; position: relative; height: 100vh; background: #111; }
        #map { height: 100%; width: 100%; }
        .section { background: #3e2723; padding: 10px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #7d5e3c; }
        h3 { margin: 0 0 8px 0; font-size: 12px; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #7d5e3c; padding-bottom: 3px; }
        textarea, input, select { background: #1a0f00; color: #00ff00; border: 1px solid #7d5e3c; border-radius: 3px; padding: 5px; font-family: monospace; font-size: 11px; width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        .btn { width: 100%; padding: 8px; background: #8d6e63; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 5px; }
        .btn:hover { background: #a1887f; }
        .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; margin-top: 5px; }
        .legend-item { display: flex; align-items: center; gap: 8px; background: #2b1d0e; padding: 4px; border-radius: 4px; }
        .shape-off { width: 10px; height: 10px; background: red; transform: rotate(45deg); border: 1px solid white; }
        .shape-def { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 12px solid #2ecc71; }
        .shape-none { width: 10px; height: 10px; background: white; border-radius: 50%; border: 1px solid #000; }
        .border-es { border: 2px solid gold; padding: 2px; border-radius: 3px; font-size: 9px; color: gold; }
        .border-lat { border: 2px solid cyan; padding: 2px; border-radius: 3px; font-size: 9px; color: cyan; }
        #bbcode-output { background: #1a0f00; color: #ffb74d; height: 180px; font-size: 10px; margin-top: 10px; border: 1px dashed #ffb74d; }
    </style>
</head>
<body>
<div id="wrapper">
    <div id="sidebar">
        <h2 style="text-align:center; color: var(--accent); margin:0 0 10px 0; font-size: 20px;">OPERACIONES ES100 v3.3</h2>
        <div class="section">
            <h3>1. Datos de Inteligencia</h3>
            <textarea id="enemyBB" rows="3" placeholder="Pega tabla de enemigos (FXUtility)..."></textarea>
            <textarea id="allyBB" rows="2" placeholder="Pega coordenadas aliadas..."></textarea>
            <button class="btn" onclick="loadData()">CARGAR AL MAPA</button>
        </div>
        <div class="section">
            <h3>2. Leyenda Táctica</h3>
            <div class="legend-grid">
                <div class="legend-item"><div class="shape-off"></div> Pueblo OFF</div>
                <div class="legend-item"><div class="shape-def"></div> Pueblo DEF</div>
                <div class="legend-item"><div class="shape-none"></div> Sin Info</div>
                <div class="legend-item"><div style="background:#00ffff; width:10px; height:10px; border-radius:50%;"></div> Aliado</div>
                <div class="legend-item"><span class="border-es">ORO</span> Español</div>
                <div class="legend-item"><span class="border-lat">CIAN</span> Latino</div>
            </div>
        </div>
        <div class="section">
            <h3>3. Planificador y Gestión</h3>
            <select id="unitSpeed" class="btn" style="background:#1a0f00; color:white;">
                <option value="30" data-unit="ram">Ariete/Cata (30 m/c)</option>
                <option value="35" data-unit="snob">Noble (35 m/c)</option>
                <option value="18" data-unit="axe">Infantería (18 m/c)</option>
            </select>
            <div style="display:flex; gap:5px;">
                <button class="btn" style="background:#388e3c" onclick="setSelectMode('origin')">SEL. ALIADOS</button>
                <button class="btn" style="background:#d32f2f" onclick="setSelectMode('target')">SEL. OBJETIVOS</button>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button class="btn" style="background:#ef6c00; flex:2;" onclick="generateMassiveOrders()">GENERAR BBCODE</button>
                <button class="btn" style="background:#b71c1c; flex:1;" onclick="clearSelectedFromMap()">BORRAR SEL.</button>
            </div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="date" id="targetDate">
                <input type="time" id="targetTime" step="1">
            </div>
        </div>
        <div class="section">
            <h3>4. BBCode Generado</h3>
            <textarea id="bbcode-output" readonly></textarea>
        </div>
    </div>
    <div id="map-container"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, enemyData = [], allyData = [], layerMain = L.layerGroup(), oArea = null, tArea = null;

    function initMap() {
        map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 4, attributionControl: false });
        map.setView([-500, 500], 0); layerMain.addTo(map);
        for(let i=0; i<=1000; i+=100) {
            L.polyline([[0, i], [-1000, i]], {color: '#332211', weight: 1, opacity: 0.4}).addTo(map);
            L.polyline([[-i, 0], [-i, 1000]], {color: '#332211', weight: 1, opacity: 0.4}).addTo(map);
        }
        const now = new Date();
        document.getElementById('targetDate').value = now.toISOString().split('T')[0];
        document.getElementById('targetTime').value = "08:00:01";
        setTimeout(() => map.invalidateSize(), 400);
    }

    function loadData() {
        const eText = document.getElementById('enemyBB').value;
        const aText = document.getElementById('allyBB').value;
        enemyData = []; allyData = [];
        const rows = eText.split(/\[\*\]|\[\*\*\]/);

        rows.forEach(r => {
            const coordRegex = /(\d{1,3})[|](\d{1,3})/g;
            let matches = [];
            let match;
            while ((match = coordRegex.exec(r)) !== null) {
                matches.push({ x: parseInt(match[1]), y: parseInt(match[2]), index: match.index, full: match[0] });
            }

            if (matches.length > 0) {
                const lowRow = r.toLowerCase();
                const isLat = lowRow.includes('lat') || lowRow.includes('mexico') || lowRow.includes('argentina');
                const isES = lowRow.includes('español') || lowRow.includes(' es ') || lowRow.includes('🇪🇸');
                let playerMatch = r.match(/\[player\](.*?)\[\/player\]/);
                let playerName = playerMatch ? playerMatch[1] : "Desconocido";

                matches.forEach((m, i) => {
                    let nextIdx = matches[i+1] ? matches[i+1].index : r.length;
                    let segment = r.substring(m.index + m.full.length, nextIdx).trim();
                    let cleanNote = segment.replace(/\[\/coord\]|\[\/player\]|\[|\]/g, '').trim();

                    enemyData.push({
                        id: Math.random(),
                        x: m.x, y: m.y,
                        player: playerName,
                        isOff: segment.toLowerCase().includes('off') || segment.toLowerCase().includes('hacha'),
                        isDef: segment.toLowerCase().includes('def') || segment.toLowerCase().includes('apoyo'),
                        isES: isES, isLat: isLat,
                        note: cleanNote || "Sin info"
                    });
                });
            }
        });

        const aMatches = [...aText.matchAll(/(\d{1,3})[|](\d{1,3})/g)];
        aMatches.forEach(m => allyData.push({ id: Math.random(), x: parseInt(m[1]), y: parseInt(m[2]) }));
        renderMarkers();
    }

    function renderMarkers() {
        layerMain.clearLayers();
        enemyData.forEach(v => {
            let shape = '<div class="shape-none"></div>';
            if(v.isOff) shape = '<div class="shape-off"></div>';
            else if(v.isDef) shape = '<div class="shape-def"></div>';

            let bCol = v.isES ? 'gold' : (v.isLat ? 'cyan' : 'transparent');
            let bStyle = (v.isES || v.isLat) ? `border: 3px solid ${bCol}; border-radius: 4px; padding: 2px;` : '';

            const icon = L.divIcon({
                className: 'c-icon',
                html: `<div style="${bStyle} display:flex; align-items:center; justify-content:center;">${shape}</div>`,
                iconSize: [22, 22]
            });
            L.marker([-v.y, v.x], {icon: icon}).bindPopup(`<b>${v.x}|${v.y}</b><br><b>Jugador:</b> ${v.player}<br><hr>${v.note}`).addTo(layerMain);
        });

        allyData.forEach(v => {
            const icon = L.divIcon({ className: 'c-icon', html: `<div style="background:#00ffff; width:10px; height:10px; border-radius:50%; border:1px solid white;"></div>` });
            L.marker([-v.y, v.x], {icon: icon}).addTo(layerMain);
        });
    }

    function clearSelectedFromMap() {
        if (oArea) {
            const b = oArea.getBounds();
            allyData = allyData.filter(v => !(v.x >= b.getWest() && v.x <= b.getEast() && v.y >= Math.abs(b.getNorth()) && v.y <= Math.abs(b.getSouth())));
            map.removeLayer(oArea); oArea = null;
        }
        if (tArea) {
            const b = tArea.getBounds();
            enemyData = enemyData.filter(v => !(v.x >= b.getWest() && v.x <= b.getEast() && v.y >= Math.abs(b.getNorth()) && v.y <= Math.abs(b.getSouth())));
            map.removeLayer(tArea); tArea = null;
        }
        renderMarkers();
    }

    let sMode = null, sStart = null, sRect = null;
    function setSelectMode(m) { sMode = m; map.dragging.disable(); }

    document.addEventListener('mousedown', (e) => {
        if (!sMode || !e.target.closest('#map')) return;
        sStart = map.mouseEventToLatLng(e);
        sRect = L.rectangle([sStart, sStart], {color: sMode==='origin'?'green':'red'}).addTo(map);
        function onMove(me) { if (sRect) sRect.setBounds([sStart, map.mouseEventToLatLng(me)]); }
        function onUp() {
            if (sMode === 'origin') { if(oArea) map.removeLayer(oArea); oArea = sRect; }
            else { if(tArea) map.removeLayer(tArea); tArea = sRect; }
            sMode = null; map.dragging.enable();
            document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    });

    function generateMassiveOrders() {
        if (!oArea || !tArea) return alert("Selecciona Origen y Destino.");
        const speed = parseFloat(document.getElementById('unitSpeed').value);
        const unit = document.getElementById('unitSpeed').options[document.getElementById('unitSpeed').selectedIndex].getAttribute('data-unit');
        const bO = oArea.getBounds(), bT = tArea.getBounds();
        const targets = enemyData.filter(v => v.x >= bT.getWest() && v.x <= bT.getEast() && v.y >= Math.abs(bT.getNorth()) && v.y <= Math.abs(bT.getSouth()));
        const sources = allyData.filter(v => v.x >= bO.getWest() && v.x <= bO.getEast() && v.y >= Math.abs(bO.getNorth()) && v.y <= Math.abs(bO.getSouth()));

        if (!targets.length || !sources.length) return alert("Áreas vacías.");

        const targetDT = new Date((document.getElementById('targetDate').value + ' ' + document.getElementById('targetTime').value).replace(/-/g, "/"));
        let finalBB = "";

        sources.forEach(s => {
            finalBB += `[size=12][b]Plan for Ally:[/b] [coord]${s.x}|${s.y}[/coord][/size]\n`;
            finalBB += `[table][**]Unit[||]Target[||]Launch Time[||]Command[/**]\n`;
            targets.forEach(t => {
                const dist = Math.sqrt(Math.pow(t.x - s.x, 2) + Math.pow(t.y - s.y, 2));
                const launch = new Date(targetDT.getTime() - (dist * speed * 60 * 1000));
                const link = `https://es100.guerrastribales.es/game.php?screen=place&x=${t.x}&y=${t.y}`;
                finalBB += `[*][unit]${unit}[/unit][|] [coord]${t.x}|${t.y}[/coord] [|]${launch.toLocaleString()}[|][url=${link}]Send[/url]\n`;
            });
            finalBB += `[/table]\n\n`;
        });
        document.getElementById('bbcode-output').value = finalBB;
    }

    window.onload = initMap;
</script>
</body>
</html>
